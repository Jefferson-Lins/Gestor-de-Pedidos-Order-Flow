spring.application.name=orderFlow

#CONFIGURANDO DATA BASE
spring.datasource.url=jdbc:mysql://localhost:3306/orderFlow?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=jefferson2000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#CONFUGURANDO HIBERNATE
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

#SUPORTE AO JSON
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=false
spring.mvc.converters.preferred-json-mapper=jackson
spring.http.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true